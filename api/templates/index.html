<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal RAG Chatbot</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; margin: 0; display: flex; justify-content: center; height: 100vh; }
        .container { width: 100%; max-width: 900px; background: white; display: flex; flex-direction: column; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { padding: 20px; background: #2c3e50; color: white; text-align: center; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .input-area { padding: 20px; border-top: 1px solid #ddd; display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        button { padding: 12px 20px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #2980b9; }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
        
        .message { max-width: 80%; padding: 15px; border-radius: 10px; line-height: 1.5; position: relative; }
        .user-msg { align-self: flex-end; background: #3498db; color: white; }
        .bot-msg { align-self: flex-start; background: #ecf0f1; color: #333; }
        
        .citation { color: #2980b9; font-weight: bold; cursor: pointer; text-decoration: underline; }
        .citation:hover { background: #d6eaf8; }
        
        /* Tooltip cho citation */
        .tooltip {
            visibility: hidden;
            width: 250px;
            background-color: #333;
            color: #fff;
            text-align: left;
            border-radius: 6px;
            padding: 10px;
            position: absolute;
            z-index: 1;
            bottom: 125%;
            left: 50%;
            margin-left: -125px;
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 0.85em;
            pointer-events: none;
        }
        .citation:hover .tooltip { visibility: visible; opacity: 1; }
        
        .steps-log { font-size: 0.8em; color: #7f8c8d; margin-bottom: 10px; font-style: italic; }
        .references { margin-top: 15px; padding-top: 10px; border-top: 1px solid #ccc; font-size: 0.85em; }
        .ref-item { margin-bottom: 5px; color: #555; }
        
        .toggle-container { display: flex; align-items: center; gap: 5px; font-size: 0.9em; color: #555; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h2>Trợ Lý Pháp Lý AI</h2></div>
    <div class="chat-box" id="chatBox"></div>
    <div class="input-area">
        <div class="toggle-container">
            <label for="streamToggle">Stream:</label>
            <input type="checkbox" id="streamToggle" checked>
        </div>
        <input type="text" id="userInput" placeholder="Nhập câu hỏi pháp lý..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()" id="sendBtn">Gửi</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const streamToggle = document.getElementById('streamToggle');

    let citationsData = {}; // Lưu trữ data citation để hover

    function appendMessage(role, text, isHtml = false) {
        const div = document.createElement('div');
        div.className = `message ${role === 'user' ? 'user-msg' : 'bot-msg'}`;
        if (isHtml) div.innerHTML = text;
        else div.textContent = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        return div;
    }

    function parseCitations(text, sources) {
        // Thay thế [N] bằng span có tooltip
        return text.replace(/\[(\d+)\]/g, (match, number) => {
            const source = sources[number];
            if (!source) return match;
            
            const snippet = source.content ? source.content.substring(0, 150) + '...' : 'Không có nội dung';
            const meta = source.metadata || {};
            const title = meta.title || meta.doc_num || 'Văn bản không tên';
            
            return `<span class="citation">${match}<span class="tooltip"><strong>${title}</strong><br>${snippet}</span></span>`;
        });
    }

    async function sendMessage() {
        const question = userInput.value.trim();
        if (!question) return;

        appendMessage('user', question);
        userInput.value = '';
        sendBtn.disabled = true;

        const useStream = streamToggle.checked;
        const botMsgDiv = appendMessage('bot', '<i>Đang xử lý...</i>', true);
        let fullText = "";
        let stepsLog = "";
        citationsData = {};

        try {
            if (useStream) {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({question, stream: true})
                });
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                            try {
                                const data = JSON.parse(line.slice(6));
                                
                                // Xử lý các bước pipeline
                                if (data.step === 'sub_queries' && data.status === 'done') {
                                    stepsLog += `🔍 Phân tích: ${data.data.queries.join(', ')}<br>`;
                                } else if (data.step === 'retrieval' && data.status === 'done') {
                                    stepsLog += `📚 Tìm thấy: ${data.data.count} kết quả<br>`;
                                } else if (data.step === 'tool_call' && data.status === 'detected') {
                                    stepsLog += `🛠️ Gọi tool: ${data.data.tool}<br>`;
                                } else if (data.step === 'answer') {
                                    if (data.status === 'streaming') {
                                        fullText += data.data.chunk;
                                        if (data.data.citations) citationsData = data.data.citations;
                                        
                                        // Render tạm thời
                                        const renderedHtml = parseCitations(fullText, citationsData);
                                        botMsgDiv.innerHTML = `<div class="steps-log">${stepsLog}</div>` + renderedHtml;
                                        chatBox.scrollTop = chatBox.scrollHeight;
                                    } else if (data.status === 'done') {
                                        // Cập nhật lần cuối đầy đủ
                                        fullText = data.data.text;
                                        citationsData = data.data.citations;
                                        const renderedHtml = parseCitations(fullText, citationsData);
                                        
                                        let refsHtml = '<div class="references"><strong>Tài liệu tham khảo:</strong>';
                                        Object.values(citationsData).forEach((src, idx) => {
                                            const m = src.metadata || {};
                                            refsHtml += `<div class="ref-item">[${idx+1}] ${m.title || m.doc_num || 'Unknown'} - ${m.article || ''}</div>`;
                                        });
                                        refsHtml += '</div>';
                                        
                                        botMsgDiv.innerHTML = `<div class="steps-log">${stepsLog}</div>` + renderedHtml + refsHtml;
                                    }
                                }
                            } catch (e) { console.error(e); }
                        }
                    }
                }
            } else {
                // Non-stream
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({question, stream: false})
                });
                const data = await response.json();
                
                if (data.final_answer) {
                    citationsData = {};
                    // Tìm citation từ steps
                    const answerStep = data.steps.find(s => s.step === 'answer' && s.status === 'done');
                    if (answerStep && answerStep.data.citations) {
                        citationsData = answerStep.data.citations;
                    }
                    
                    const renderedHtml = parseCitations(data.final_answer, citationsData);
                    
                    let refsHtml = '<div class="references"><strong>Tài liệu tham khảo:</strong>';
                    Object.values(citationsData).forEach((src, idx) => {
                        const m = src.metadata || {};
                        refsHtml += `<div class="ref-item">[${idx+1}] ${m.title || m.doc_num || 'Unknown'}</div>`;
                    });
                    refsHtml += '</div>';
                    
                    botMsgDiv.innerHTML = renderedHtml + refsHtml;
                }
            }
        } catch (err) {
            botMsgDiv.innerHTML += `<br><span style="color:red">Lỗi: ${err.message}</span>`;
        } finally {
            sendBtn.disabled = false;
            userInput.focus();
        }
    }
</script>
</body>
</html>
